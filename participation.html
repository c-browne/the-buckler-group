<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reserve Participation | The Buckler Group</title>

<style>
.portal-header{
    margin-bottom:60px;
}

.portal-brand {
  margin-bottom: 46px;
}

.portal-monogram {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 72px;
  line-height: .9;
  color: #c9a24a;
  letter-spacing: .03em;
}

.portal-wordmark {
  margin-top: 10px;
  color: #ffffff;
  font-size: 15px;
  letter-spacing: .22em;
  text-transform: uppercase;

}
body{
    margin:0;
    body{
    background:
      radial-gradient(circle at top left,
      rgba(184,148,69,.08),
      transparent 35%),
      #08111a;
}
    color:#ffffff;
    font-family:Arial,sans-serif;
}

.registration-wrapper {
  max-width: 1120px;
  margin: 0 auto;
  padding: 64px 36px;
  display: grid;
  grid-template-columns: .85fr 1.25fr;
  gap: 56px;
  align-items: start;
}

.form-card {
  background: #ffffff;
  color: #06101a;
  border: 1px solid #c9a24a;
  padding: 34px;
  box-shadow: 0 28px 70px rgba(0,0,0,.35);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px 24px;
}

.field.full {
  grid-column: span 2;
}

label {
  color: #06101a;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .11em;
  margin-bottom: 8px;
}

input,
select {
  width: 100%;
  background: #ffffff;
  color: #06101a;
  border: 1px solid #cfd6dd;
  padding: 13px 14px;
  font-size: 15px;
}

select option {
  background: #ffffff;
  color: #06101a;
}

.form-submit {
  width: 100%;
  margin-top: 26px;
  padding: 17px 28px;
  background: linear-gradient(135deg, #c9a24a 0%, #9b7429 100%);
  color: #06101a;
  border: 1px solid #c9a24a;
  text-transform: uppercase;
  letter-spacing: .14em;
  font-weight: 800;
  cursor: pointer;
}

.field.full{
    grid-column:span 1;
}

h1{
    font-size:42px;
}

}

</style>

</head>

<body>

<div class="registration-wrapper">

<p class="kicker">The Buckler Group</p>
<div class="portal-header">
<div class="portal-brand">
  <div class="portal-monogram">TBG</div>
  <div class="portal-wordmark">The Buckler Group</div>
</div>
<h1>Reserve Participation</h1>

<p class="intro">
Submit your participation request for the 2026 Caribbean Entitlement & Hospitality Strategic Sessions.
</p>

<form
  name="strategic-session-registration"
  method="POST"
  action="/thank-you.html"
  data-netlify="true"
  netlify-honeypot="bot-field">

<input type="hidden"
name="form-name"
value="strategic-session-registration">

<p hidden>
<label>
Don't fill this out:
<input name="bot-field">
</label>
</p>

<div class="form-grid">

<div class="field">
<label>First Name</label>
<input type="text" name="first-name" required>
</div>

<div class="field">
<label>Last Name</label>
<input type="text" name="last-name" required>
</div>

<div class="field full">
<label>Name of Institution</label>
<input type="text" name="institution" required>
</div>

<div class="field full">
<label>Title</label>
<input type="text" name="title" required>
</div>

<div class="field">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="field">
<label>Phone Number</label>
<input type="tel" name="phone" required>
</div>

<div class="field full">
<label>LinkedIn Profile URL</label>
<input type="url" name="linkedin-profile">
</div>

<div class="field full">
<label>Jurisdiction of Interest</label>
<select name="jurisdiction-interest" required>
<option value="">Select Jurisdiction</option>
<option>Guyana</option>
<option>Barbados</option>
<option>Bahamas</option>
<option>Grenada</option>
<option>Antigua & Barbuda</option>
<option>Trinidad & Tobago</option>
<option>Tobago</option>
<option>Multiple Jurisdictions</option>
</select>
</div>

<div class="field full">
<label>Participant Type</label>
<select name="participant-type" required>
<option value="">Select Participant Type</option>
<option>Investor</option>
<option>Developer</option>
<option>Hospitality Executive</option>
<option>Government Official</option>
<option>Service Provider</option>
<option>Academic</option>
<option>Student</option>
<option>Other</option>
</select>
</div>

<div class="field full">
<label>How Did You Hear About This Session?</label>
<select name="referral-source">
<option value="">Select One</option>
<option>LinkedIn</option>
<option>The Buckler Group Website</option>
<option>EXODUS™</option>
<option>CAIPA</option>
<option>AAREPNY</option>
<option>Cornell Hotel Society</option>
<option>Government Partner</option>
<option>Professional Referral</option>
<option>Email Invitation</option>
<option>Other</option>
</select>
</div>

<div class="field full">
<label>Areas of Interest</label>
<input type="text"
name="areas-of-interest"
placeholder="Hospitality, Real Estate, Infrastructure, Diaspora Capital">
</div>

</div>
<div class="field full">
<label>Session of Interest</label>

<select name="session-interest" required>
<option value="">Select Session</option>
<option>Guyana Strategic Session</option>
<option>Barbados Strategic Session</option>
<option>Bahamas Strategic Session</option>
<option>Grenada Strategic Session</option>
<option>Antigua & Barbuda Strategic Session</option>
<option>Trinidad & Tobago Strategic Session</option>
<option>Tobago Strategic Session</option>
<option>Multiple Sessions</option>
</select>

<button type="submit" class="form-submit">
  Submit Participation Request
</button>

</form>

</div>

</body>
</html>
