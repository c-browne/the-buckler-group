<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Participation Interest | The Buckler Group</title>
  <style>
    :root{
      --navy:#061526;
      --navy2:#0a2035;
      --gold:#c9a24a;
      --cream:#f6f1e8;
      --muted:#9aa8b6;
      --white:#ffffff;
      --teal:#2f9f91;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: Georgia, "Times New Roman", serif;
      background:var(--navy);
      color:var(--white);
    }

    .page{
      min-height:100vh;
      background:
        linear-gradient(135deg, rgba(6,21,38,.96), rgba(6,21,38,.86)),
        radial-gradient(circle at 75% 15%, rgba(201,162,74,.18), transparent 32%);
      padding:48px 6vw;
    }

    .brand{
      max-width:1180px;
      margin:0 auto 52px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:24px;
      border-bottom:1px solid rgba(201,162,74,.35);
      padding-bottom:28px;
    }

    .brand h1{
      margin:0;
      font-size:28px;
      letter-spacing:.16em;
      font-weight:400;
      text-transform:uppercase;
    }

    .brand p{
      margin:8px 0 0;
      color:var(--gold);
      letter-spacing:.22em;
      text-transform:uppercase;
      font-size:12px;
      font-family:Arial, sans-serif;
    }

    .nav a{
      color:var(--cream);
      text-decoration:none;
      font-family:Arial, sans-serif;
      font-size:13px;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .hero{
      max-width:1180px;
      margin:0 auto 44px;
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:52px;
      align-items:start;
    }

    .eyebrow{
      color:var(--teal);
      font-family:Arial, sans-serif;
      letter-spacing:.18em;
      text-transform:uppercase;
      font-size:13px;
      margin-bottom:18px;
    }

    .hero h2{
      font-size:54px;
      line-height:1.04;
      margin:0 0 22px;
      font-weight:400;
      letter-spacing:.02em;
    }

      color:#dbe3
